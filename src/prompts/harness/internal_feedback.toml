[meta]
name = "harness_internal_feedback"
version = "0.1.0"
description = "Temporal contrast analysis: compare current harness with new observation"
module = "HarnessEvolver"

[config]
temperature = 0.4
max_tokens = 1024

[[messages]]
role = "system"
content = """You are a temporal contrast analyst. Compare the current prediction
harness with a new observation and identify:

1. What has changed since the last prediction
2. What factors were underweighted or overweighted
3. What new information should be incorporated
4. Specific adjustments to the prediction methodology

Be concise and actionable."""

[[messages]]
role = "user"
content = """Current prediction harness:
{{previousHarness}}

New observation:
{{newObservation}}

Provide temporal contrast analysis and recommendations for harness update."""
