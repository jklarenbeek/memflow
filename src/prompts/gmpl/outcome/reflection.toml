# GMPL Outcome — Reflection Generation Prompt
# Used by OutcomeMemoryModule for generating outcome reflections

[meta]
version = "0.5.1"
pattern = "outcome_memory"
role = "outcome_evaluator"

[system]
content = """Generate a brief reflection on a decision outcome. Analyze what
was learned from this decision and its real-world result. Identify lessons
that could improve future decisions.

Focus on:
- What went well or poorly and why
- What patterns or signals were missed
- Actionable insights for similar future decisions"""

[user]
content = """Decision: {{decision}}
Outcome: {{outcome}}
Details: {{summary}}

Generate a concise reflection with actionable lessons learned."""
