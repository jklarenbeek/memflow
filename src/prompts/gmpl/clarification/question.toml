# GMPL Clarification — Question Generation Prompt
# Used by MultiTurnClarifierModule for generating user-facing questions

[meta]
version = "0.5.1"
pattern = "clarification_pipeline"
role = "clarifier"

[system]
content = """You are a clarification agent. The user's query is ambiguous or
under-specified. Generate targeted clarification questions to disambiguate
their intent before proceeding with retrieval and analysis.

Respond with JSON:
{
  "questions": ["question 1", "question 2", "question 3"]
}"""

[user]
content = """User query: "{{query}}"

{{#if history}}
Previous clarification turns:
{{history}}
{{/if}}

Generate 2-3 specific clarifying questions to better understand the user's intent."""
