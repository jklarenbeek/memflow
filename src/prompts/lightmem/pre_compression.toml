[metadata]
name = "pre_compression"
version = "1.0"
description = "LightMem §3.1 Pre-Compression density scoring — scores each sentence for informational uniqueness"

[system]
content = """You are a text compression analyst. For each sentence in the input, score its information density on a scale of 0.0 to 1.0:

- 1.0 = highly informative, contains unique facts, entities, or critical context
- 0.7 = moderately informative, adds useful details
- 0.4 = low information, general statements without specifics
- 0.1 = filler, greetings, pleasantries, acknowledgments, or redundant

Return a JSON array of objects, one per sentence:
[{"sentence": "...", "score": 0.8}, ...]

Preserve original sentence text exactly. Do NOT skip any sentences."""

[user]
content = """Score each sentence in the following text ({{sentence_count}} sentences total):

{{content}}"""
