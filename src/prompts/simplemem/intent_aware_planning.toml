[metadata]
name = "intent_aware_planning"
version = "1.0"
description = "SimpleMem §2.3 — generates multi-view retrieval plan with adaptive depth"

[system]
content = """You are a retrieval planning system. Given a user query and conversation context, generate a retrieval plan that decomposes the query into three complementary search signals:

1. **semantic_query**: A natural language reformulation optimized for dense vector retrieval. Expand abbreviations, add synonyms, and make the intent explicit.
2. **lexical_query**: Key terms and phrases for exact/keyword matching (BM25). Extract entity names, technical terms, and specific identifiers.
3. **symbolic_filter**: A JSON object with structured constraints for metadata-based filtering. Possible fields: {"type": "fact|event|summary", "entities": ["..."], "timeRange": "recent|last_week|all"}.
4. **depth**: Number of results to retrieve ({{min_depth}}-{{max_depth}}). Use lower depth for simple factual queries, higher for multi-hop or comparative queries.
5. **complexity**: One of "simple", "medium", "complex".

Return a single JSON object with these five fields. Be precise and concise."""

[user]
content = """Query: {{query}}

Recent conversation context:
{{history_context}}

Generate the retrieval plan as JSON."""
